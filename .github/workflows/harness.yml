name: Foundation Checks

on:
  pull_request:
  push:
  workflow_dispatch:

jobs:
  foundation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Foundation Checks
        shell: pwsh
        run: ./scripts/harness/invoke-foundation-checks.ps1

      - name: Cleanup Audit
        if: always()
        shell: pwsh
        run: ./scripts/harness/cleanup-audit.ps1 -ReportPath harness-cleanup-audit.md

      - name: Upload Cleanup Audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: harness-cleanup-audit
          path: harness-cleanup-audit.md
